<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decode — Paste &amp; Decode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">de<span class="accent">·</span>code</a>
      <span class="nav-cta" style="color: var(--ink-ghost); cursor: default;">Powered by IBM Bob</span>
    </div>
  </nav>

  <div class="app-wrap">

    <!-- ─── INPUT SCREEN ─── -->
    <div class="app-screen" id="inputScreen">
      <div class="app-header">
        <h1 class="app-title">What needs decoding?</h1>
        <p class="app-sub">Paste the text below and select what kind it is.</p>
      </div>

      <label class="field-label" for="pasteInput">The confusing text</label>
      <textarea
        id="pasteInput"
        placeholder="Paste any brief, feedback, requirement, or code review comment that left you unsure what to do next…"
      ></textarea>

      <label class="field-label" style="margin-top: 1.75rem;">Type of text</label>
      <div class="type-grid">
        <button class="type-btn active" data-type="assignment">
          <span class="type-tag">Assignment</span>
          <span class="type-desc">Brief or instruction from a professor or teacher</span>
        </button>
        <button class="type-btn" data-type="feedback">
          <span class="type-tag">Feedback</span>
          <span class="type-desc">Manager or professional feedback on your work</span>
        </button>
        <button class="type-btn" data-type="requirement">
          <span class="type-tag">Requirement</span>
          <span class="type-desc">Client or stakeholder project requirement</span>
        </button>
        <button class="type-btn" data-type="code_review">
          <span class="type-tag">Code review</span>
          <span class="type-desc">Technical comment from a code reviewer</span>
        </button>
      </div>

      <button class="decode-btn" id="decodeBtn" onclick="runDecode()">
        Decode
        <span class="decode-arrow">→</span>
      </button>

      <div class="loader" id="loader">
        <div class="loader-dots">
          <span></span><span></span><span></span>
        </div>
        <span>Reading between the lines…</span>
      </div>

      <div class="error-msg" id="errorMsg" style="display:none"></div>
    </div>

    <!-- ─── OUTPUT SCREEN ─── -->
    <div class="app-screen" id="outputScreen" style="display:none">
      <button class="back-btn" onclick="goBack()">← Decode another</button>
      <div class="input-echo" id="inputEcho"></div>
      <div class="report" id="reportContainer"></div>
    </div>

  </div>

  <script src="prompt.js"></script>
  <script src="app.js"></script>
</body>
</html>
